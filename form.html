<!DOCTYPE encoding="UTF-8" html>
<html lang="es">
  <head>
    <link rel="stylesheet" href="css/nav.css">
		<link rel="stylesheet" href="css/form.css">
		<link rel="stylesheet" href="css/texts.css">
    <link rel="icon" href="assets/icon.ico" type="image/x-icon">
  </head>

  <body>
		<ul>
			<li><a href="index.html">Inicio</a></li>
			<li><a href="socials.html">Redes Sociales</a></li>
			<li><a href="form.html">Formulario</a></li>
		</ul>

    <title>Formulario Academico</title>
    <h1>Formulario Academico</h1><br>

    <form action="index.html">
      <fieldset id="info_box">
        <legend id="info_legend">Información personal:</legend><br><br>

        <label for="nombre" id="nombre_label">Nombre Completo:</label>
        <input type="text" id="nombre" name="nombre" style="width: 220px"><br><br>
        <label for="correo" id="correo_label">Correo Electronico:</label>
        <input type="email" id="correo" name="correo" style="width: 200px"><br><br>
        <label for="edad" id="edad_label">Edad:</label>
        <input type="number" id="edad" name="edad" style="width: 40px"><br><br>
        <label for="nacimiento" id="nacimiento_label">Fecha de nacimiento:</label>
        <input type="date" id="nacimiento" name="nacimiento" style="width: 100px"><br>
      </fieldset><br>

      <fieldset id="acad_box">
        <legend id="acad_legend">Información académica:</legend><br>

        <label for="semestre" id="semestre_label">Semestre actual:</label>
        <select name="semestre" id="semestre">
          <option value="1">Primero</option>
          <option value="2">Segundo</option>
          <option value="3">Tercero</option>
          <option value="4">Cuarto</option>
          <option value="5">Quinto</option>
        </select><br>

        <label>Jornada de estudio:</label><br>
        <input type="radio" id="dia" name="dia_option" value="Diurna">
        <label for="dia">Diurna</label><br>
        <input type="radio" id="noche" name="noche_option" value="Vespertina">
        <label for="noche">Vespertina</label><br>
      </fieldset><br>

      <fieldset id="tec_box">
        <legend id="tec_legend">Tecnologías de interés</legend><br>

        <input type="checkbox" id="opt1" class="opt1" value="Programación">
        <label for="opt1" class="text-general">Programación</label><br>
        <input type="checkbox" id="opt2" name="opt2" value="Programación Orientada a Objetos">
        <label for="opt2" class="text-general">Programación Orientada a Objetos</label><br>
        <input type="checkbox" id="opt3" name="opt3" value="Diseño de Base de Datos">
        <label for="opt3" class="text-general">Diseño de Base de Datos</label><br>
        <input type="checkbox" id="opt4" name="opt4" value="Programación Componentes Web">
        <label for="opt4" class="text-general">Programación Componentes Web</label><br>
        <input type="checkbox" id="opt5" name="opt5" value="Aplicaciones Móviles ">
        <label for="opt5" class="text-general">Aplicaciones Móviles </label><br>
        <input type="checkbox" id="opt6" name="opt6" value="Programación Avanzada">
        <label for="opt6" class="text-general">Programación Avanzada</label><br>
      </fieldset><br>

      <fieldset id="lang_box">
        <legend id="lang_legend">Lenguaje de programación favorito</legend><br>

        <label for="lang">Elija su lenguaje favorito:</label>
        <input list="langs" name="lang" id="lang">
        <datalist id="langs">
          <option value="Java">
          <option value="Python">
          <option value="JavaScript">
          <option value="C#">
          <option value="C++">
          <option value="PHP">
          <option value="HTML">
        </datalist>
      </fieldset><br>

      <fieldset id="expectativas_box">
        <legend id="expectativas_legend">Expectativas del taller</legend><br>
        <textarea id="expectativas" name="expectativas" rows="4" cols="50"></textarea>
      </fieldset><br>

      <input type="submit" value="Enviar">
      <input type="button" value="Limpiar">
    </form>
  </body>
</html>
